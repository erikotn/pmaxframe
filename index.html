                                            {k.avatar ? <img src={k.avatar.src} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-gray-600"><Icons.Briefcase /></div>}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex justify-between items-start">
                                                <span className="text-[10px] font-bold text-gray-400 uppercase truncate">{k.name}</span>
                                                <button onClick={e => deleteBrandKit(k.id, e)} className="text-gray-500 hover:text-red-400"><Icons.Trash /></button>
                                            </div>
                                            <p className="text-sm font-medium truncate">{k.senderName}</p>
                                            <p className="text-[10px] text-gray-500 truncate">{k.url}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {sidebarTab === 'export' && (
                            <div className="p-5 space-y-5 animate-fade-in flex-grow overflow-y-auto">
                                <p className="text-[12px] text-gray-400">Vink placements aan en exporteer alles als ZIP.</p>
                                <div>
                                    <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2">Placements</h3>
                                    {Object.entries(PLACEMENTS).map(([id, p]) => (
                                        <label key={id} className="flex items-center gap-2 text-sm cursor-pointer mb-1.5">
                                            <input type="checkbox" checked={exportOpts.placements[id]}
                                                onChange={e => setExportOpts(prev => ({ ...prev, placements: { ...prev.placements, [id]: e.target.checked } }))} />
                                            {p.name}
                                        </label>
                                    ))}
                                </div>
                                {exportOpts.placements['display-banner'] && (
                                    <div>
                                        <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2">Banner-formaten</h3>
                                        {Object.entries(DISPLAY_SIZES).map(([id, s]) => (
                                            <label key={id} className="flex items-center gap-2 text-sm cursor-pointer mb-1.5">
                                                <input type="checkbox" checked={exportOpts.displaySizes[id]}
                                                    onChange={e => setExportOpts(prev => ({ ...prev, displaySizes: { ...prev.displaySizes, [id]: e.target.checked } }))} />
                                                {s.name}
                                            </label>
                                        ))}
                                    </div>
                                )}
                                <button onClick={generateBatch} disabled={loading}
                                    className="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-gray-200 flex items-center justify-center gap-2 text-sm">
                                    <Icons.Package />
                                    {batchProgress ? `Bezig (${batchProgress.done}/${batchProgress.total})` : 'Export ZIP'}
                                </button>
                            </div>
                        )}
                    </aside>

                    <main
                        className={`flex-1 bg-black relative flex items-center justify-center p-8 checkerboard overflow-auto ${dropping ? 'dropzone-active' : ''}`}
                        onDragOver={e => { e.preventDefault(); setDropping(true); }}
                        onDragLeave={() => setDropping(false)}
                        onDrop={handleDrop}
                    >
                        <CanvasPreview
                            placement={placement}
                            displaySize={placement === 'display-banner' ? displaySize : null}
                            content={content}
                            style={style}
                        />
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
